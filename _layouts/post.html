---
layout: default
---

<article class="w-full">
  <p
    class="font-sans text-sm font-semibold uppercase tracking-[0.22em] text-teal-700"
  >
    Post
  </p>
  <h1
    class="mt-3 text-4xl font-semibold tracking-tight text-slate-950 sm:text-5xl"
  >
    {{ page.title }}
  </h1>
  <p class="mt-3 font-sans text-sm text-slate-500">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </p>

  <div
    class="prose prose-slate prose-lg mt-8 max-w-none leading-8 text-slate-700 prose-headings:font-semibold prose-headings:tracking-tight prose-headings:text-slate-950 prose-a:font-medium prose-a:text-teal-700 hover:prose-a:text-teal-800 prose-code:text-slate-900 prose-code:before:content-none prose-code:after:content-none marker:text-slate-600 prose-ul:pl-10 prose-ol:pl-10"
  >
    {{ content }}
  </div>

  <script
    src="https://utteranc.es/client.js"
    repo="gz/website"
    issue-term="pathname"
    theme="github-light"
    crossorigin="anonymous"
    async
  ></script>
</article>
