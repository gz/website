navigation:

url: /index.html

<!doctype html>
<html lang="en">
  <head>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-67902252-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "UA-67902252-1");
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <link rel="shortcut icon" href="favicon.png" />
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0f172a",
              muted: "#475569",
              paper: "#fffdf8",
              line: "#e2e8f0",
              accent: "#0f766e",
            },
            boxShadow: {
              paper: "0 10px 30px rgba(15, 23, 42, 0.06)",
            },
            fontFamily: {
              serif: ['"Source Serif 4"', "Georgia", "serif"],
              sans: ['"Inter"', '"Helvetica Neue"', "sans-serif"],
            },
          },
        },
      };
    </script>

    <title>{{ page.title }}</title>

    <link
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
    <link href="/css/syntax.css" rel="stylesheet" />
  </head>

  <body class="bg-white text-ink antialiased">
    <div class="mx-auto max-w-5xl px-5 pb-16 pt-6 sm:px-8 lg:px-10">
      <header class="mb-10 border-b border-slate-200 pb-5">
        <div
          class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between"
        >
          <div>
            <a
              class="font-sans-display text-sm font-semibold uppercase tracking-[0.22em] text-slate-900"
              href="/"
              >{{ site.name }}</a
            >
          </div>
          <nav
            class="flex flex-wrap gap-x-5 gap-y-2 font-sans text-sm font-medium text-slate-600"
          >
            {% for link in page.navigation %}
            <a
              class="{% if page.url == link.url %}text-slate-950{% else %}text-slate-600{% endif %} transition hover:text-slate-950"
              href="{{ link.url }}"
              title="{{ link.title }}"
              >{{ link.text }}</a
            >
            {% endfor %}
            <a class="transition hover:text-slate-950" href="/blog" title="Blog"
              >Blog</a
            >
            <a class="transition hover:text-slate-950" href="/cv.pdf" title="CV"
              >CV</a
            >
            <a
              class="transition hover:text-slate-950"
              href="https://github.com/gz"
              title="GitHub"
              >GitHub</a
            >
            <a
              class="transition hover:text-slate-950"
              href="https://www.linkedin.com/in/gerd-zellweger/"
              title="LinkedIn"
              >LinkedIn</a
            >
          </nav>
        </div>
      </header>

      <main>{{ content }}</main>

      <footer
        class="mt-16 border-t border-slate-200 pt-5 font-sans text-sm text-slate-500"
      >
        <div
          class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between"
        >
          <div>Gerd Zellweger</div>
          <div>mail at gerdzellweger.com</div>
        </div>
      </footer>
    </div>
  </body>
</html>
